<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
      color: #fff;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 2.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1.5rem;
    }

    .card h2 {
      font-size: 0.8rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
      margin-bottom: 1.25rem;
    }

    .stats-row {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }

    .stat {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      flex: 1;
    }

    .stat .label {
      font-size: 0.78rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
    }

    .stat .value {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.03em;
    }

    .stat .sub {
      font-size: 0.8rem;
      color: #444;
      margin-top: 0.25rem;
    }

    canvas { width: 100% !important; }

    .goal-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .goal-label {
      font-size: 0.85rem;
      width: 90px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #bbb;
    }

    .goal-bar-bg {
      flex: 1;
      height: 8px;
      background: #2a2a2a;
      border-radius: 99px;
      overflow: hidden;
    }

    .goal-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: #3b82f6;
      transition: width 0.6s ease;
    }

    .goal-bar-fill.done {
      background: #22c55e;
    }

    .goal-pct {
      font-size: 0.78rem;
      color: #555;
      width: 36px;
      text-align: right;
    }
  </style>
</head>
<body>
  <h1>Time Tracker</h1>
  <div class="subtitle" id="updated">Henter data...</div>

  <div class="stats-row" id="stats"></div>

  <div class="grid">
    <div class="card">
      <h2>Timer per dag — seneste 14 dage</h2>
      <canvas id="dailyChart"></canvas>
    </div>
    <div class="card">
      <h2>Timer per uge — seneste 8 uger</h2>
      <canvas id="weeklyChart"></canvas>
    </div>
    <div class="card" id="goalsCard" style="display:none">
      <h2>Ugentlige m\u00e5l (denne uge)</h2>
      <div id="goalBars"></div>
    </div>
  </div>

  <script>
    Chart.defaults.color = "#555";
    Chart.defaults.borderColor = "#222";

    function fmtHours(h) {
      const hh = Math.floor(h);
      const mm = Math.round((h - hh) * 60);
      if (hh === 0) return `${mm}m`;
      if (mm === 0) return `${hh}t`;
      return `${hh}t ${mm}m`;
    }

    function isoDate(d) {
      return d.toISOString().slice(0, 10);
    }

    function startOfWeek(d) {
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      const w = new Date(d);
      w.setDate(diff);
      w.setHours(0, 0, 0, 0);
      return w;
    }

    const COLORS = [
      "#3b82f6", "#a78bfa", "#34d399", "#f59e0b",
      "#f87171", "#38bdf8", "#fb923c", "#e879f9"
    ];

    async function init() {
      const res = await fetch("/api/data");
      const { log, goals } = await res.json();

      const now = new Date();
      document.getElementById("updated").textContent =
        `Opdateret ${now.toLocaleString("da-DK")}`;

      const projects = [...new Set(log.map(s => s.project))];

      // ── Stats ────────────────────────────────────────────────
      const weekStart = startOfWeek(now);
      const dayStart = new Date(now); dayStart.setHours(0,0,0,0);

      const thisWeek = log.filter(s => new Date(s.start) >= weekStart);
      const today = log.filter(s => new Date(s.start) >= dayStart);

      const totalWeek = thisWeek.reduce((acc, s) =>
        acc + (new Date(s.end) - new Date(s.start)) / 3600000, 0);
      const totalDay = today.reduce((acc, s) =>
        acc + (new Date(s.end) - new Date(s.start)) / 3600000, 0);

      const statsEl = document.getElementById("stats");
      statsEl.innerHTML = `
        <div class="stat">
          <div class="label">I dag</div>
          <div class="value">${fmtHours(totalDay)}</div>
          <div class="sub">${today.length} session${today.length !== 1 ? "er" : ""}</div>
        </div>
        <div class="stat">
          <div class="label">Denne uge</div>
          <div class="value">${fmtHours(totalWeek)}</div>
          <div class="sub">${thisWeek.length} session${thisWeek.length !== 1 ? "er" : ""}</div>
        </div>
        <div class="stat">
          <div class="label">Total</div>
          <div class="value">${fmtHours(log.reduce((acc, s) =>
            acc + (new Date(s.end) - new Date(s.start)) / 3600000, 0))}</div>
          <div class="sub">${log.length} session${log.length !== 1 ? "er" : ""} i alt</div>
        </div>
      `;

      // ── Daily chart (14 dage) ────────────────────────────────
      const days = [];
      for (let i = 13; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(d.getDate() - i);
        days.push(isoDate(d));
      }

      const dailyData = {};
      for (const p of projects) dailyData[p] = new Array(14).fill(0);

      for (const s of log) {
        const d = isoDate(new Date(s.start));
        const idx = days.indexOf(d);
        if (idx === -1) continue;
        const h = (new Date(s.end) - new Date(s.start)) / 3600000;
        dailyData[s.project][idx] += h;
      }

      new Chart(document.getElementById("dailyChart"), {
        type: "bar",
        data: {
          labels: days.map(d => {
            const [,m,dd] = d.split("-");
            return `${dd}/${m}`;
          }),
          datasets: projects.map((p, i) => ({
            label: p,
            data: dailyData[p],
            backgroundColor: COLORS[i % COLORS.length] + "cc",
            borderRadius: 4,
            borderSkipped: false,
          }))
        },
        options: {
          responsive: true,
          plugins: { legend: { position: "bottom", labels: { boxWidth: 10 } } },
          scales: {
            x: { stacked: true, grid: { display: false } },
            y: { stacked: true, ticks: { callback: v => fmtHours(v) } }
          }
        }
      });

      // ── Weekly chart (8 uger) ────────────────────────────────
      const weekStarts = [];
      for (let i = 7; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(d.getDate() - i * 7);
        weekStarts.push(startOfWeek(d));
      }

      const weeklyData = {};
      for (const p of projects) weeklyData[p] = new Array(8).fill(0);

      for (const s of log) {
        const sDate = new Date(s.start);
        const sw = startOfWeek(sDate).getTime();
        const idx = weekStarts.findIndex(w => w.getTime() === sw);
        if (idx === -1) continue;
        const h = (new Date(s.end) - new Date(s.start)) / 3600000;
        weeklyData[s.project][idx] += h;
      }

      new Chart(document.getElementById("weeklyChart"), {
        type: "bar",
        data: {
          labels: weekStarts.map(w => {
            const d = w.toLocaleDateString("da-DK", { day: "numeric", month: "short" });
            return d;
          }),
          datasets: projects.map((p, i) => ({
            label: p,
            data: weeklyData[p],
            backgroundColor: COLORS[i % COLORS.length] + "cc",
            borderRadius: 4,
            borderSkipped: false,
          }))
        },
        options: {
          responsive: true,
          plugins: { legend: { position: "bottom", labels: { boxWidth: 10 } } },
          scales: {
            x: { stacked: true, grid: { display: false } },
            y: { stacked: true, ticks: { callback: v => fmtHours(v) } }
          }
        }
      });

      // ── Goal bars ────────────────────────────────────────────
      if (Object.keys(goals).length > 0) {
        document.getElementById("goalsCard").style.display = "block";
        const barsEl = document.getElementById("goalBars");

        for (const [project, goal] of Object.entries(goals)) {
          const logged = (thisWeek
            .filter(s => s.project === project)
            .reduce((acc, s) =>
              acc + (new Date(s.end) - new Date(s.start)) / 3600000, 0));
          const pct = Math.min(100, Math.round((logged / goal.weeklyHours) * 100));
          const done = pct >= 100;

          barsEl.innerHTML += `
            <div class="goal-row">
              <div class="goal-label" title="${project}">${project}</div>
              <div class="goal-bar-bg">
                <div class="goal-bar-fill ${done ? "done" : ""}" style="width:${pct}%"></div>
              </div>
              <div class="goal-pct">${pct}%</div>
            </div>
            <div style="font-size:0.75rem;color:#444;margin-bottom:1rem;margin-left:98px">
              ${fmtHours(logged)} / ${goal.weeklyHours}t m\u00e5l
            </div>
          `;
        }
      }
    }

    init().catch(console.error);
  </script>
</body>
</html>
